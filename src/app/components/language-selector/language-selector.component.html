<div class="lang-selector" [class.open]="isOpen()">
  <button
    class="lang-trigger"
    (click)="toggleOpen()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox"
    aria-label="Select language"
  >
    <span class="flag">{{ current.flag }}</span>
    <span class="name">{{ current.name }}</span>
    <span class="chevron" [class.rotated]="isOpen()">›</span>
  </button>

  @if (isOpen()) {
    <ul class="lang-dropdown" role="listbox" aria-label="Language options">
      @for (option of options; track option.code) {
        <li
          role="option"
          [attr.aria-selected]="option.code === currentLang()"
          class="lang-option"
          [class.active]="option.code === currentLang()"
          (click)="select(option.code)"
          (keydown)="onKeydown($event, option.code)"
          tabindex="0"
        >
          <span class="flag">{{ option.flag }}</span>
          <span class="name">{{ option.name }}</span>
        </li>
      }
    </ul>
  }
</div>
