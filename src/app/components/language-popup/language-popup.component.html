<div class="popup-overlay" role="dialog" aria-modal="true" aria-label="Language confirmation">
  <div class="popup-card">
    <div class="popup-body">
      <div class="popup-prompt" aria-hidden="true">
        <span class="prompt-sym">$</span>
        <span class="prompt-cmd">./detect-language --confirm</span>
      </div>

      <div class="lang-confirm">
        <span class="lang-flag">{{ current.flag }}</span>
        <span class="lang-name">{{ current.name }}</span>
        <span class="lang-country">{{ current.country }}</span>
        <span class="lang-locale">{{ current.prompt }}</span>
      </div>

      <p class="popup-question">{{ text.question }}</p>

      <div class="popup-actions">
        <button class="btn-confirm" (click)="confirm()">
          {{ text.confirm }}
        </button>

        <div class="lang-change" [class.open]="isOpen()">
          <button
            class="btn-change"
            (click)="toggleOpen()"
            [attr.aria-expanded]="isOpen()"
            aria-haspopup="listbox"
          >
            {{ text.change }}
            <span class="chevron" [class.rotated]="isOpen()">›</span>
          </button>

          @if (isOpen()) {
            <ul class="lang-dropdown" role="listbox" aria-label="Languages">
              @for (option of options; track option.code) {
                <li
                  role="option"
                  [attr.aria-selected]="option.code === currentLang()"
                  class="lang-option"
                  [class.active]="option.code === currentLang()"
                  (click)="preview(option.code)"
                  (keydown)="onKeydown($event, () => preview(option.code))"
                  tabindex="0"
                >
                  <span class="flag">{{ option.flag }}</span>
                  <span class="name">{{ option.name }}</span>
                  <span class="country">{{ option.country }}</span>
                </li>
              }
            </ul>
          }
        </div>
      </div>
    </div>
  </div>
</div>
