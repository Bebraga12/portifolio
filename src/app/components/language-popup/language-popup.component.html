<div class="popup-overlay" role="dialog" aria-modal="true" aria-label="Language selection">
  <div class="popup-card">
    <div class="popup-body">
      <div class="popup-prompt" aria-hidden="true">
        <span class="prompt-sym">$</span>
        <span class="prompt-cmd">./select-language --interactive</span>
      </div>

      <p class="popup-hint">
        <span class="lang-hint">Select / Selecione / Выберите</span>
      </p>

      <div class="lang-options" role="listbox" aria-label="Languages">
        @for (option of options; track option.code) {
          <button
            class="lang-card"
            role="option"
            [attr.aria-label]="option.name + ' — ' + option.country"
            (click)="select(option.code)"
            (keydown)="onKeydown($event, option.code)"
          >
            <span class="lang-flag">{{ option.flag }}</span>
            <span class="lang-name">{{ option.name }}</span>
            <span class="lang-country">{{ option.country }}</span>
            <span class="lang-locale">{{ option.prompt }}</span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
